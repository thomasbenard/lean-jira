jira:
  # Pour Atlassian Cloud avec custom domain qui bloque Basic auth, utiliser
  # le gateway: https://api.atlassian.com/ex/jira/<cloudId>/
  # cloudId récupérable via GET https://<your-domain>/_edge/tenant_info
  baseUrl: "https://jira.your-company.com"
  email: "your.email@company.com"
  apiToken: "YOUR_API_TOKEN"
  projectKey: "YOUR_PROJECT_KEY"
  boardId: 1
  # Colonne TODO du kanban (point de départ du lead time)
  todoStatuses:
    - "To Do"
    - "Ready"
  # Colonnes "en cours" (pour cycle time + WIP). Exclure les statuts qui
  # mappent à la colonne DONE du board, sinon le WIP gonfle.
  inProgressStatuses:
    - "In Progress"
    - "In Review"
  # doneStatuses: conservé pour documentation. Les métriques (lead-time,
  # cycle-time, throughput) s'appuient sur le champ Jira `resolutiondate`
  # plutôt que sur les transitions, qui peuvent être polluées par les
  # bulk closes lors de migrations de workflow.
  doneStatuses:
    - "Done"

metrics:
  # Optionnel. Issues résolues avant cette date sont ignorées par lead-time,
  # cycle-time et throughput. Utile si l'instance a subi un bulk close lors
  # d'une migration de workflow.
  # cutoffDate: "2025-11-01"

db:
  path: "./lean-jira.db"
