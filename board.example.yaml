board:
  columns:
    # type: todo  → début du lead time
    - name: "À faire"
      type: todo
      statuses:
        - "To Do"
        - "Ready"

    # type: active + devStart: true → début du cycle time
    # devStart peut être sur plusieurs colonnes ; leurs statuts sont unionés
    # role: dev|qa|po → optionnel, indique quel rôle travaille dans la colonne
    #   (fondation métriques role-aware ; ignoré si absent)
    - name: "Développement"
      type: active
      devStart: true
      # role: dev
      statuses:
        - "In Progress"

    # type: queue → temps d'attente (flow-efficiency)
    - name: "Review"
      type: queue
      # role: qa
      statuses:
        - "In Review"

    # type: done → livraison équipe
    - name: "Done"
      type: done
      statuses:
        - "Done"

  # Statuts historiques renommés absents de l'API Jira courante.
  # Complète la détection automatique via statusCategory.key='done'.
  # Garder cette liste minimale — ajouter uniquement les statuts qui
  # apparaissent dans l'historique des transitions mais plus dans /rest/api/2/status.
  # legacyDoneStatuses:
  #   - "Delivered"

metrics:
  # Optionnel. Issues résolues avant cette date sont ignorées par lead-time,
  # cycle-time et throughput. Utile si l'instance a subi un bulk close lors
  # d'une migration de workflow.
  # cutoffDate: "2025-11-01"
  # Types Jira considérés comme bugs (non estimés par nature). Bucket dédié
  # "BUG" dans les by-size + exclus des métriques d'estimation (normalized,
  # weighted throughput). Métriques dédiées: bug-cycle-time, bug-throughput.
  bugIssueTypes:
    - "Bug"

  # Méthode d'estimation de l'équipe.
  # Détermine les métriques by-size et throughput-weighted.
  # Pas de weightField — champ et unité dérivés automatiquement depuis method.
  #
  # --- Time estimate (défaut, pas de section estimation requise) ---
  # estimation:
  #   method: "time"
  #   bucketThresholds: { xs: 0.5, s: 1, m: 3, l: 5 }   # jours ouvrés (optionnel)
  #
  # --- Story points (champ Atlassian standard customfield_10016) ---
  # estimation:
  #   method: "story-points"
  #   bucketThresholds: { xs: 1, s: 3, m: 8, l: 13 }     # SP (optionnel)
  #
  # --- Complexity / Fibonacci / champ numérique custom ---
  # estimation:
  #   method: "numeric"
  #   jiraField: "customfield_10099"                       # obligatoire
  #   bucketThresholds: { xs: 2, s: 5, m: 10, l: 20 }    # obligatoire
  #
  # --- Taille de t-shirt (valeurs XS/S/M/L/XL dans Jira) ---
  # estimation:
  #   method: "t-shirt"
  #   jiraField: "customfield_10200"                       # obligatoire
  #   # throughput-weighted désactivé automatiquement
  #
  # --- Pas d'estimation ---
  # estimation:
  #   method: "none"
  #   # by-size et throughput-weighted désactivés automatiquement

  # Seuils des signaux de santé sur les KPIs du rapport.
  # Absents = aucun signal affiché. Toutes les clés sont optionnelles.
  # Durées en jours ouvrés. bugRatio = ratio 0-1 (0.20 = 20%).
  # throughputWeekly : directionnel "plus haut = mieux" (orange si < warn, rouge si < crit).
  # healthThresholds:
  #   leadTimeMedianDays:     { warn: 5,    crit: 10   }
  #   cycleTimeMedianDays:    { warn: 3,    crit: 7    }
  #   throughputWeekly:       { warn: 3,    crit: 1    }
  #   wipCount:               { warn: 5,    crit: 8    }
  #   bugCycleTimeMedianDays: { warn: 3,    crit: 7    }
  #   bugRatio:               { warn: 0.20, crit: 0.40 }
