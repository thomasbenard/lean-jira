board:
  legacyDoneStatuses:
    - "Delivred"
    - "DELIVERED"
  columns:
    - name: "Backlog"
      type: todo
      statuses:
        - "To Do"
    - name: "Development"
      type: active
      devStart: true
      role: dev
      statuses:
        - "In Progress"
    - name: "Code Review"
      type: queue
      role: dev
      statuses:
        - "In Review"
    - name: "QA Testing"
      type: queue
      role: qa
      statuses:
        - "In QA"
    - name: "PO Validation"
      type: queue
      role: po
      statuses:
        - "Awaiting PO"
    - name: "Done"
      type: done
      statuses:
        - "Done"

metrics:
  cutoffDate: "2025-09-01"
  bugIssueTypes:
    - "Bug"
  excludeIssueTypes:
    - "Sub-task"
  scopeChangeGracePeriodHours: 48
  healthThresholds:
    leadTimeMedianDays: { warn: 10, crit: 20 }
    cycleTimeMedianDays: { warn: 5, crit: 10 }
    throughputWeekly: { warn: 3, crit: 1 }
    wipCount: { warn: 8, crit: 12 }
    bugCycleTimeMedianDays: { warn: 3, crit: 7 }
    bugRatio: { warn: 0.2, crit: 0.35 }
